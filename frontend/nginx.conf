server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    location /challenges {
        proxy_pass ${BACKEND_URL};
        proxy_set_header Host $http_host;
    }

    location /ai {
        proxy_pass ${BACKEND_URL};
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}